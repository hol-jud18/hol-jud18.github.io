---
layout: default
---
<article>
  <a href="{{ '/blog/' | relative_url }}" class="post-back">&larr; back to blog</a>

  <header class="post-header">
    <div class="post-header-meta">
      <span>{{ page.date | date: "%Y-%m-%d" }}</span>
      {% if page.tags %}
        {% for tag in page.tags %}
          <span class="tag {% if tag == 'malware' or tag == 'offensive' %}tag-red{% elsif tag == 'windows' or tag == 'linux' %}tag-blue{% else %}tag-accent{% endif %}">{{ tag }}</span>
        {% endfor %}
      {% endif %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}<p class="text-dim">{{ page.description }}</p>{% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
